<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>旅遊產業垂直整合 Agent Demo — 對話版</title>
<style>
  :root {
    --bg: #f7f7f5; --surface: #ffffff; --surface-2: #f1f1ef; --border: #e3e2de;
    --text: #1c1c1a; --text-muted: #6b6b64; --accent: #b45309; --accent-2: #0f6b5c;
    --real: #0f6b5c; --real-bg: #e6f3ef; --sim: #8a6d1a; --sim-bg: #faf0da;
    --running: #1d5fb8; --running-bg: #e5eefb; --error: #a3402f; --error-bg: #fbeae6;
    --bubble-user: #0f6b5c; --bubble-user-text: #ffffff; --bubble-assistant: #f1f1ef;
    --radius: 10px; --shadow: 0 1px 2px rgba(0,0,0,.05), 0 1px 8px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17181a; --surface: #202226; --surface-2: #26282c; --border: #34363a;
      --text: #ececea; --text-muted: #a2a29c; --accent: #e0a24a; --accent-2: #4fbfa8;
      --real: #4fbfa8; --real-bg: #17332c; --sim: #e0c168; --sim-bg: #362f18;
      --running: #6ba6f2; --running-bg: #17253b; --error: #e08a7a; --error-bg: #3a201c;
      --bubble-user: #2d6b5c; --bubble-user-text: #ffffff; --bubble-assistant: #26282c;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 1px 12px rgba(0,0,0,.25);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 1.25rem 2rem; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Helvetica Neue", "PingFang TC", "Noto Sans TC", sans-serif;
    line-height: 1.6;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  header.page-header { padding: 2.25rem 0 .5rem; }
  header.page-header h1 { font-size: 1.5rem; margin: 0 0 .35rem; }
  header.page-header .sub { color: var(--text-muted); font-size: .88rem; }
  section { margin: 1.25rem 0; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1rem 1.1rem; box-shadow: var(--shadow);
  }
  .hidden { display: none !important; }

  /* --- intake form --- */
  #form-card .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: .85rem; }
  #form-card label { display: block; font-size: .78rem; color: var(--text-muted); margin-bottom: .3rem; }
  #form-card select, #form-card input, #form-card textarea {
    width: 100%; padding: .5rem .55rem; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text); font-size: .92rem; font-family: inherit;
  }
  #form-card textarea { resize: vertical; min-height: 5.5rem; line-height: 1.5; }
  .actions { margin-top: 1.1rem; display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
  button.primary {
    background: var(--accent); color: #fff; border: none; border-radius: 999px;
    padding: .6rem 1.4rem; font-size: .9rem; font-weight: 600; cursor: pointer;
  }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  button.secondary {
    background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 999px;
    padding: .5rem 1.1rem; font-size: .85rem; cursor: pointer;
  }
  button.small { padding: .35rem .8rem; font-size: .8rem; }

  /* --- sticky totals bar --- */
  #totals-bar {
    position: sticky; top: 0; z-index: 10; margin: 0 -1.25rem 1rem; padding: .6rem 1.25rem;
    background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 1.3rem;
    flex-wrap: wrap; align-items: center; font-size: .82rem; backdrop-filter: blur(6px);
  }
  #totals-bar .stat .label { color: var(--text-muted); font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; }
  #totals-bar .stat .value { font-size: 1rem; font-variant-numeric: tabular-nums; }
  #totals-bar .run-status { margin-left: auto; font-size: .78rem; padding: .2rem .6rem; border-radius: 999px; }
  .run-status.running { background: var(--running-bg); color: var(--running); }
  .run-status.done { background: var(--real-bg); color: var(--real); }
  .run-status.error { background: var(--error-bg); color: var(--error); }

  /* --- phase stepper --- */
  #phase-stepper { display: flex; flex-wrap: wrap; gap: .35rem; font-size: .76rem; }
  #phase-stepper .step-chip {
    padding: .25rem .65rem; border-radius: 999px; background: var(--surface-2); color: var(--text-muted);
    border: 1px solid var(--border);
  }
  #phase-stepper .step-chip.current { background: var(--running-bg); color: var(--running); border-color: transparent; font-weight: 600; }
  #phase-stepper .step-chip.past { background: var(--real-bg); color: var(--real); border-color: transparent; }

  /* --- chat --- */
  #chat-log { display: flex; flex-direction: column; gap: .75rem; margin-bottom: .75rem; }
  .msg { max-width: 88%; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg .bubble { padding: .6rem .85rem; border-radius: 14px; font-size: .92rem; white-space: pre-wrap; }
  .msg.user .bubble { background: var(--bubble-user); color: var(--bubble-user-text); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--bubble-assistant); color: var(--text); border-bottom-left-radius: 4px; }
  .msg .meta { font-size: .7rem; color: var(--text-muted); margin-top: .25rem; }
  .proposal-cards { margin-top: .5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); gap: .75rem; }
  .msg:has(.proposal-cards) { max-width: 100%; }
  .badge { display: inline-block; font-size: .68rem; padding: .1rem .5rem; border-radius: 999px; font-weight: 600; }
  .badge-real { background: var(--real-bg); color: var(--real); }
  .badge-sim { background: var(--sim-bg); color: var(--sim); }
  .day-block { display: flex; gap: .6rem; padding: .3rem 0; border-bottom: 1px dashed var(--border); font-size: .86rem; }
  .day-block:last-child { border-bottom: none; }
  .day-block .time { flex: 0 0 90px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .day-title { font-weight: 700; margin: .5rem 0 .1rem; font-size: .85rem; }

  /* --- plan bundle (two full-trip options) --- */
  .plan-option-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .85rem .95rem; }
  .plan-option-head { display: flex; align-items: center; gap: .3rem; }
  .plan-option-label { font-weight: 700; font-size: .95rem; }
  .plan-option-card .sub { font-size: .82rem; color: var(--text-muted); }
  .plan-vendor-group { margin-top: .6rem; padding-top: .5rem; border-top: 1px dashed var(--border); }
  .plan-vendor-label { font-size: .78rem; font-weight: 600; color: var(--text-muted); margin-bottom: .3rem; }
  .plan-vendor-item { font-size: .84rem; margin-bottom: .4rem; }
  .plan-vendor-item .name { font-weight: 600; }
  .plan-vendor-item a { color: var(--accent-2); font-size: .78rem; }
  .pick-btn { display: block; width: 100%; }

  /* per-venue hyperlink + hover/focus citation-quote tooltip */
  .cited-venue { position: relative; color: var(--accent-2); text-decoration: none; border-bottom: 1px dotted var(--accent-2); cursor: help; }
  .cited-venue .tooltip-bubble {
    display: none; position: absolute; bottom: 125%; left: 0; z-index: 20; width: max-content; max-width: 260px;
    background: var(--text); color: var(--bg); font-size: .74rem; padding: .5rem .65rem; border-radius: 8px;
    line-height: 1.45; box-shadow: var(--shadow); white-space: normal;
  }
  .cited-venue:hover .tooltip-bubble, .cited-venue:focus .tooltip-bubble { display: block; }
  .source-icons { margin-top: .55rem; font-size: .8rem; }
  .source-icons a { color: var(--accent-2); }

  #chat-input-row { display: flex; gap: .5rem; position: sticky; bottom: 0; background: var(--bg); padding: .5rem 0; }
  #chat-input-row input {
    flex: 1; padding: .65rem .85rem; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: .92rem;
  }
  .turn-steps:empty { display: none; }

  /* --- referral --- */
  #referral-section .referral-note { font-size: .76rem; color: var(--text-muted); margin-top: .6rem; }
  .referral-group { margin-top: .65rem; }
  .referral-group-label { font-size: .78rem; font-weight: 600; color: var(--text-muted); margin-bottom: .3rem; }
  .referral-link-row { margin-bottom: .4rem; }
  .referral-link {
    display: inline-block; color: var(--accent-2); font-size: .88rem; text-decoration: none;
    border: 1px solid var(--border); border-radius: 999px; padding: .4rem .85rem;
  }
  /* --- tail auto-run steps (reused visual language) --- */
  .step { border-left: 3px solid var(--border); padding-left: .9rem; margin-bottom: .8rem; }
  .step.running { border-left-color: var(--running); }
  .step.done { border-left-color: var(--real); }
  .step-head { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .step-head .icon { font-size: 1.05rem; opacity: .5; }
  .step.running .step-head .icon, .step.done .step-head .icon { opacity: 1; }
  .step-status { font-size: .72rem; padding: .1rem .5rem; border-radius: 999px; background: var(--surface-2); color: var(--text-muted); }
  .step.running .step-status { background: var(--running-bg); color: var(--running); }
  .step.done .step-status { background: var(--real-bg); color: var(--real); }
  .spinner {
    width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--running-bg);
    border-top-color: var(--running); display: inline-block; animation: spin .7s linear infinite; margin-right: .3rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .metrics-badge { font-size: .72rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .step-body { margin-top: .4rem; font-size: .85rem; }
  .confirm-line { margin-top: .4rem; padding: .4rem .55rem; border-radius: 8px; background: var(--surface-2); font-size: .8rem; }

  /* --- final --- */
  .review-card .stars { color: var(--accent); font-size: 1.1rem; }
  .share-box { margin-top: .6rem; padding: .65rem .85rem; border-radius: 8px; background: var(--real-bg); color: var(--real); font-size: .88rem; }
  #calendar-panel .date-row { display: flex; gap: .5rem; align-items: center; margin: .5rem 0; }
  #error-banner { background: var(--error-bg); color: var(--error); padding: .8rem 1rem; border-radius: 8px; font-size: .88rem; }
</style>
</head>
<body>
<div class="wrap">
  <header class="page-header">
    <h1>旅遊產業垂直整合 Agent Demo</h1>
    <div class="sub" id="header-sub">對話版 — 用一段話描述你的旅行，agent 生成一個真實方案，並導流到真實網站查看報價</div>
  </header>

  <section id="form-section">
    <div class="card" id="form-card">
      <form id="intake-form">
        <label for="intake-input">跟我說說這趟旅行——出發地、目的地、天數/人數，還有同行的長輩/幼兒/寵物等特殊需求</label>
        <textarea id="intake-input" rows="4" placeholder="例如：我們一家四口，兩個小小孩跟一隻狗，想從台北去礁溪玩兩天，想悠閒一點不要走太多路……"></textarea>
        <div class="grid" style="margin-top:.85rem;">
          <div>
            <label>搜尋模式</label>
            <select id="site-mode-select">
              <option value="unrestricted" selected>不限定網站</option>
              <option value="allowlist">限定可信網域清單</option>
            </select>
            <div id="site-mode-note" style="font-size:.72rem; color:var(--text-muted); margin-top:.3rem;"></div>
          </div>
          <div>
            <label>模型</label>
            <select id="model-select">
              <option value="claude-opus-4-8" selected>claude-opus-4-8</option>
              <option value="claude-sonnet-5">claude-sonnet-5</option>
              <option value="claude-haiku-4-5">claude-haiku-4-5</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button type="submit" class="primary" id="start-btn">開始規劃</button>
        </div>
      </form>
    </div>
  </section>

  <div id="totals-bar" class="hidden">
    <div class="stat"><div class="label">經過時間</div><div class="value" id="stat-elapsed">0.0s</div></div>
    <div class="stat"><div class="label">Tokens（輸入+輸出）</div><div class="value" id="stat-tokens">0 + 0</div></div>
    <div class="stat"><div class="label">預估花費</div><div class="value" id="stat-cost">$0.0000</div></div>
    <div class="stat"><div class="label">搜尋次數</div><div class="value" id="stat-searches">0</div></div>
    <div class="run-status running hidden" id="run-status">對話中</div>
  </div>

  <section id="phase-stepper-section" class="hidden">
    <div id="phase-stepper"></div>
  </section>

  <div id="error-banner" class="hidden"></div>

  <!-- chat phase UI -->
  <section id="chat-section" class="hidden">
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="輸入訊息…">
      <button type="button" class="primary" id="send-btn">送出</button>
    </div>
  </section>

  <!-- referral panel (shown right after picking a plan option) -->
  <section id="referral-section" class="hidden card"></section>

  <!-- demo-complete wrap-up: shown instead of the tail when enable_tail_pipeline is off -->
  <section id="demo-complete-section" class="hidden">
    <div class="card">
      <h2 style="font-size:1rem; margin-top:0;">✅ Demo 完成：行程規劃 → 導流</h2>
      <p style="font-size:.9rem; color:var(--text-muted);">
        後續的餐飲/景點/購物/導覽/動態重排/評價，以及 Google Calendar 同步，目前透過本機設定關閉。
      </p>
      <div id="demo-complete-totals" style="font-size:.88rem; margin-top:.4rem;"></div>
    </div>
    <div class="actions" style="margin-top:.75rem;">
      <a id="link-dashboard-complete" href="#" target="_blank"><button type="button" class="secondary">查看完整 Dashboard</button></a>
      <a id="link-json-complete" href="#" target="_blank"><button type="button" class="secondary">下載 trip_log.json</button></a>
    </div>
  </section>

  <!-- tail auto-run steps -->
  <section id="tail-section" class="hidden">
    <h2 style="font-size:1rem;">🚀 自動接續：餐飲 / 景點 / 購物 / 導覽 / 動態重排 / 評價</h2>
    <div id="tail-steps"></div>
  </section>

  <!-- final actions -->
  <section id="final-section" class="hidden">
    <div id="final-review-card" class="card review-card"></div>
    <div class="card hidden" id="calendar-panel" style="margin-top:.75rem;">
      <strong>📅 加入 Google Calendar</strong>
      <div class="date-row">
        <label style="font-size:.82rem; color:var(--text-muted);">行程從哪一天開始？</label>
        <input type="date" id="calendar-start-date">
      </div>
      <div class="actions">
        <button type="button" class="primary" id="calendar-connect-btn">使用 Google 帳號登入並授權</button>
      </div>
      <div id="calendar-result" style="margin-top:.6rem;"></div>
    </div>
    <div class="actions" style="margin-top:.75rem;">
      <a id="link-dashboard" href="#" target="_blank"><button type="button" class="secondary">查看完整 Dashboard</button></a>
      <a id="link-json" href="#" target="_blank"><button type="button" class="secondary">下載 trip_log.json</button></a>
    </div>
  </section>
</div>

<script>
const PHASE_LABELS = {
  itinerary: "行程規劃", tail: "餐飲/景點/購物/導覽/重排/評價", done: "完成",
};
const REFERRAL_LABELS = { transportation: "🚄 交通", accommodation: "🏨 住宿", activities: "🎫 活動" };

let CONFIG = { default_inspiration_domains: [], enable_tail_pipeline: true, enable_calendar_sync: true, rag_enabled: false };
let PHASE_ORDER = ["itinerary", "tail", "done"];
const TAIL_STAGE_ORDER = ["dining", "attractions", "shopping", "in_trip_guide", "replanning", "review"];
const TAIL_STAGE_LABELS = {
  dining: "餐飲", attractions: "景點", shopping: "購物", in_trip_guide: "行中導覽",
  replanning: "動態重新排程", review: "評價與分享",
};
const TAIL_STAGE_ICONS = { dining: "🍜", attractions: "🎡", shopping: "🛍️", in_trip_guide: "🧭", replanning: "⚡", review: "⭐" };

function esc(s) {
  const d = document.createElement("div");
  d.textContent = (s === null || s === undefined) ? "" : String(s);
  return d.innerHTML;
}
function safeUrl(u) { return (typeof u === "string" && /^https?:\/\//.test(u)) ? u : "#"; }
function fmtMoney(v) { return "$" + Number(v).toFixed(4); }
function fmtSeconds(ms) { return (ms / 1000).toFixed(1) + "s"; }

let runId = null;
let phase = "itinerary";
let planReady = false;
let runningTotals = {total_input_tokens: 0, total_output_tokens: 0, total_cost_usd: 0, total_web_search_requests: 0, total_duration_ms: 0};

function updateTotalsBar(totals) {
  runningTotals = totals;
  // 經過時間只計每一步 agent 實際處理的時間總和（totals.total_duration_ms），
  // 不是從畫面打開就開始跑的 wall-clock，所以使用者閱讀/打字的時間不會被計入。
  document.getElementById("stat-elapsed").textContent = fmtSeconds(totals.total_duration_ms);
  document.getElementById("stat-tokens").textContent = `${totals.total_input_tokens} + ${totals.total_output_tokens}`;
  document.getElementById("stat-cost").textContent = fmtMoney(totals.total_cost_usd);
  document.getElementById("stat-searches").textContent = totals.total_web_search_requests;
}

function renderStepper() {
  const el = document.getElementById("phase-stepper");
  const idx = PHASE_ORDER.indexOf(phase);
  el.innerHTML = PHASE_ORDER.map((p, i) => {
    const cls = i < idx ? "past" : (i === idx ? "current" : "");
    return `<span class="step-chip ${cls}">${PHASE_LABELS[p]}</span>`;
  }).join("");
}

function appendChatMessage(role, text, proposalHtml) {
  const log = document.getElementById("chat-log");
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = `<div class="bubble">${esc(text)}</div>` + (proposalHtml ? `<div class="proposal-cards">${proposalHtml}</div>` : "");
  log.appendChild(div);
  div.scrollIntoView({behavior: "smooth", block: "end"});
}

function renderVendorGroup(icon, label, candidates) {
  if (!candidates || !candidates.length) return "";
  const items = candidates.map(c => `
    <div class="plan-vendor-item">
      <div class="name">${esc(c.name)}</div>
      <div class="sub">${esc(c.vendor)} · ${esc(c.price_range)}${c.duration ? ' · ' + esc(c.duration) : ''} · ⭐${c.rating}</div>
      ${c.schedule_note ? `<div class="sub">🕐 ${esc(c.schedule_note)}</div>` : ''}
      <div class="sub">${esc(c.description)}</div>
      ${c.source_url ? `<a href="${safeUrl(c.source_url)}" target="_blank" rel="noopener">🔗 ${esc(c.source_title || '來源')}</a>` : ''}
    </div>`).join("");
  return `<div class="plan-vendor-group"><div class="plan-vendor-label">${icon} ${label}</div>${items}</div>`;
}

function renderPlanOption(opt) {
  let daysHtml = "";
  for (const day of opt.days) {
    daysHtml += `<div class="day-title">第 ${day.day_number} 天</div>`;
    for (const b of day.blocks) {
      let venueHtml = `<strong>${esc(b.theme)}</strong>`;
      if (b.source_url) {
        const quote = b.citation_quote ? `「${b.citation_quote}」` : "";
        const src = b.source_title ? ` — ${b.source_title}` : "";
        venueHtml = `<a href="${safeUrl(b.source_url)}" target="_blank" rel="noopener" class="cited-venue" title="${esc(quote + src)}">
          <strong>${esc(b.theme)}</strong><span class="tooltip-bubble">${esc(quote + src)}</span>
        </a>`;
      }
      daysHtml += `<div class="day-block"><div class="time">${esc(b.time_block)}</div><div>${venueHtml} — ${esc(b.location_hint)}</div></div>`;
    }
  }

  let sourcesHtml = "";
  if (opt.primary_sources && opt.primary_sources.length) {
    sourcesHtml += `<div class="source-icons">📚 主軸來源：` +
      opt.primary_sources.map(s => `<a href="${safeUrl(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a>`).join(" · ") + `</div>`;
  }
  if (opt.corroboration_sources && opt.corroboration_sources.length) {
    sourcesHtml += `<div class="source-icons">📎 補充佐證：` +
      opt.corroboration_sources.map(s => `<a href="${safeUrl(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a>`).join(" · ") + `</div>`;
  }

  return `
    <div class="plan-option-card">
      <div class="plan-option-head">
        <span class="plan-option-label">方案 ${esc(opt.label)}</span>
      </div>
      <div class="sub" style="margin:.3rem 0 .6rem;">${esc(opt.why_recommended)}</div>
      ${daysHtml}
      ${renderVendorGroup('🚄', '交通', opt.transportation)}
      ${renderVendorGroup('🏨', '住宿', opt.accommodation)}
      ${renderVendorGroup('🎫', '活動', opt.activities)}
      ${sourcesHtml}
      <button type="button" class="primary small pick-btn" style="margin-top:.7rem;" onclick="pickPlan('${opt.option_id}')">選這個方案</button>
    </div>`;
}

function renderPlanBundle(options) {
  return options.map(opt => renderPlanOption(opt)).join("");
}

async function apiPost(path, body) {
  const resp = await fetch(path, {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body || {})});
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({detail: resp.statusText}));
    throw new Error(err.detail || "請求失敗");
  }
  return resp.json();
}

// ---- per-turn step-by-step progress (reuses the tail pipeline's .step/
// .step-head/.step-status/.metrics-badge/.spinner CSS) ----
let turnCounter = 0;
const turnStepEls = {}; // turnId -> { label: {root, status, metrics} }

function fmtCallMetrics(m) {
  return `${fmtSeconds(m.duration_ms)} · ${m.input_tokens}+${m.output_tokens} tok` +
    (m.web_search_requests ? ` · 🔍${m.web_search_requests}` : "") +
    ` · ${fmtMoney(m.cost_usd)}`;
}

function beginThinkingTurn() {
  const log = document.getElementById("chat-log");
  const turnId = "turn" + (++turnCounter);
  const wrap = document.createElement("div");
  wrap.className = "msg assistant";
  wrap.id = turnId;
  wrap.innerHTML = `<div class="turn-steps" id="${turnId}-steps"></div>`;
  log.appendChild(wrap);
  turnStepEls[turnId] = {};
  wrap.scrollIntoView({behavior: "smooth", block: "end"});
  return turnId;
}

function ensureTurnStep(turnId, label) {
  const map = turnStepEls[turnId];
  if (map[label]) return map[label];
  const container = document.getElementById(turnId + "-steps");
  const div = document.createElement("div");
  div.className = "step running";
  div.innerHTML = `
    <div class="step-head">
      <span class="step-status"><span class="spinner"></span>執行中…</span>
      <span>${esc(label)}</span>
      <span class="metrics-badge"></span>
    </div>`;
  container.appendChild(div);
  const rec = { root: div, status: div.querySelector(".step-status"), metrics: div.querySelector(".metrics-badge") };
  map[label] = rec;
  div.scrollIntoView({behavior: "smooth", block: "end"});
  return rec;
}

function setTurnStepDone(turnId, label, metrics) {
  const rec = ensureTurnStep(turnId, label); // defensive: step_completed should always follow step_started
  rec.root.className = "step done";
  rec.status.textContent = "已完成";
  rec.metrics.textContent = fmtCallMetrics(metrics);
}

function finishThinkingTurn(turnId, replyText, proposalHtml) {
  const wrap = document.getElementById(turnId);
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = esc(replyText);
  wrap.appendChild(bubble);
  if (proposalHtml) {
    const cards = document.createElement("div");
    cards.className = "proposal-cards";
    cards.innerHTML = proposalHtml;
    wrap.appendChild(cards);
  }
  wrap.scrollIntoView({behavior: "smooth", block: "end"});
}

function streamMessage(turnId, text) {
  return new Promise((resolve, reject) => {
    const es = new EventSource(`/api/chat/${runId}/message-events?text=${encodeURIComponent(text)}`);
    es.onmessage = (e) => {
      const event = JSON.parse(e.data);
      if (event.type === "step_started") {
        ensureTurnStep(turnId, event.label);
      } else if (event.type === "step_completed") {
        setTurnStepDone(turnId, event.label, event.data.metrics);
      } else if (event.type === "message_done") {
        resolve(event.data);
      } else if (event.type === "error") {
        reject(new Error(event.data.message));
      }
    };
    es.addEventListener("done", () => es.close());
  });
}

function renderChatReply(turnId, r) {
  planReady = !!r.proposal.plan_ready;
  const proposalHtml = planReady ? renderPlanBundle(r.proposal.options) : "";
  finishThinkingTurn(turnId, r.reply_message, proposalHtml);
  updateTotalsBar(r.totals);
}

async function sendChatMessage(text) {
  const turnId = beginThinkingTurn();
  document.getElementById("send-btn").disabled = true;
  try {
    const data = await streamMessage(turnId, text);
    renderChatReply(turnId, data);
  } catch (e) {
    showError(e.message);
  } finally {
    document.getElementById("send-btn").disabled = false;
  }
}

window.pickPlan = async function (optionId) {
  try {
    const r = await apiPost(`/api/chat/${runId}/select-plan`, {option_id: optionId});
    appendChatMessage("user", `選擇方案 ${r.option.label}`);
    showReferralPanel(r.option, r.referrals);
    phase = r.next_phase;
    renderStepper();
    document.getElementById("chat-section").classList.add("hidden");
    if (phase === "tail") {
      startTail();
    } else if (phase === "done") {
      showDemoComplete();
    }
  } catch (e) {
    showError(e.message);
  }
};

function showReferralPanel(option, referrals) {
  // Unlike the old single-stage referral flow, a plan pick can produce up to
  // 5 real vendor links at once (transportation + 2x accommodation +
  // up to 3x activities). Browsers generally only honor a synchronous
  // window.open() for the first call within one user gesture, so
  // auto-opening several tabs here would be both popup-blocker-fragile and
  // surprising. A clean list of individually-clickable links is just as
  // honest and far more predictable.
  const panel = document.getElementById("referral-section");
  panel.classList.remove("hidden");
  let linksHtml = "";
  for (const stageKey of ["transportation", "accommodation", "activities"]) {
    const items = referrals[stageKey];
    if (!items || !items.length) continue;
    linksHtml += `<div class="referral-group"><div class="referral-group-label">${REFERRAL_LABELS[stageKey]}</div>`;
    for (const ref of items) {
      linksHtml += `<div class="referral-link-row">
        <a href="${esc(ref.url)}" target="_blank" rel="noopener" class="referral-link">🔗 前往 ${esc(ref.vendor)} 查看「${esc(ref.candidate_name)}」</a>
      </div>`;
    }
    linksHtml += `</div>`;
  }
  panel.innerHTML = `
    <strong>✅ 已選擇方案 ${esc(option.label)}</strong>
    <div class="sub" style="margin:.4rem 0 .3rem;">${esc(option.why_recommended)}</div>
    ${linksHtml}
    <div class="referral-note">
      以上都是真實網站的連結，點開後由你自己在對方網站查看報價、庫存並完成後續動作——本 app 不會追蹤或知道你是否有實際預訂。
    </div>
  `;
  panel.scrollIntoView({behavior: "smooth", block: "center"});
}

function showDemoComplete() {
  document.getElementById("demo-complete-section").classList.remove("hidden");
  document.getElementById("demo-complete-totals").innerHTML =
    `經過時間 ${document.getElementById("stat-elapsed").textContent} · ` +
    `Tokens ${runningTotals.total_input_tokens} + ${runningTotals.total_output_tokens} · ` +
    `預估花費 ${fmtMoney(runningTotals.total_cost_usd)}`;
  document.getElementById("link-dashboard-complete").href = `/api/chat/${runId}/dashboard`;
  document.getElementById("link-json-complete").href = `/api/chat/${runId}/trip_log.json`;
  document.getElementById("run-status").className = "run-status done";
  document.getElementById("run-status").textContent = "✅ Demo 完成";
}

function showError(msg) {
  const banner = document.getElementById("error-banner");
  banner.classList.remove("hidden");
  banner.textContent = "❌ " + msg;
}

// ---- tail auto-run (SSE), reuses the same event shapes as the batch pipeline ----
function buildTailStepCards() {
  const container = document.getElementById("tail-steps");
  container.innerHTML = "";
  for (const stage of TAIL_STAGE_ORDER) {
    const div = document.createElement("div");
    div.className = "step pending";
    div.id = "tstep-" + stage;
    div.innerHTML = `
      <div class="step-head">
        <span class="icon">${TAIL_STAGE_ICONS[stage]}</span>
        <span>${TAIL_STAGE_LABELS[stage]}</span>
        <span class="step-status" id="tstatus-${stage}">待開始</span>
        <span class="metrics-badge" id="tmetrics-${stage}"></span>
      </div>
      <div class="step-body" id="tbody-${stage}"></div>
    `;
    container.appendChild(div);
  }
}

function setTailStepStatus(stage, cls, text, spinner) {
  const el = document.getElementById("tstep-" + stage);
  if (!el) return;
  el.className = "step " + cls;
  document.getElementById("tstatus-" + stage).innerHTML = (spinner ? '<span class="spinner"></span>' : '') + esc(text);
}

function renderTailBody(stage, output) {
  if (stage === "dining" || stage === "attractions" || stage === "shopping") {
    const anyReal = output.candidates.some(c => c.data_source === "real_search");
    const finalId = (output.confirmation && output.confirmation.final_candidate_id) || output.agent_selected_candidate_id;
    const chosen = output.candidates.find(c => c.id === finalId);
    return `<span class="badge ${anyReal ? 'badge-real' : 'badge-sim'}">${anyReal ? '真實資料' : '模擬資料'}</span>
      <div style="margin-top:.3rem;">${chosen ? esc(chosen.name) + ' · ' + esc(chosen.vendor) : ''}</div>
      <div class="confirm-line">🧑 虛擬使用者：${output.confirmation ? esc(output.confirmation.feedback) : ''}</div>`;
  }
  if (stage === "in_trip_guide") {
    return output.guide_sections.map(s => `<div>第 ${s.day_number} 天：${s.tips.map(esc).join(' · ')}</div>`).join("");
  }
  if (stage === "replanning") {
    return `<div>${esc(output.change_summary)}</div><div class="confirm-line">📱 ${esc(output.concierge_notification)}</div>`;
  }
  if (stage === "review") {
    const full = Math.round(output.overall_rating);
    return `
      <div class="stars">${"★".repeat(full)}${"☆".repeat(5 - full)} ${output.overall_rating}/5</div>
      <p>${esc(output.review_text)}</p>
      <div class="share-box">${esc(output.share_caption)}</div>`;
  }
  return "";
}

function startTail() {
  document.getElementById("tail-section").classList.remove("hidden");
  buildTailStepCards();
  const es = new EventSource(`/api/chat/${runId}/tail-events`);
  es.onmessage = (e) => {
    const event = JSON.parse(e.data);
    const stage = event.stage;
    if (event.type === "stage_started") {
      setTailStepStatus(stage, "running", "執行中...", true);
    } else if (event.type === "hitl_checkpoint") {
      setTailStepStatus(stage, "running", "虛擬使用者確認中...", true);
    } else if (event.type === "stage_completed") {
      setTailStepStatus(stage, "done", "已完成", false);
      document.getElementById("tmetrics-" + stage).textContent =
        `${fmtSeconds(event.data.metrics.total_duration_ms)} · ${event.data.metrics.total_input_tokens}+${event.data.metrics.total_output_tokens} tok · ${fmtMoney(event.data.metrics.total_cost_usd)}`;
      document.getElementById("tbody-" + stage).innerHTML = renderTailBody(stage, event.data.output);
      updateTotalsBar(event.data.totals);
    } else if (event.type === "run_completed") {
      updateTotalsBar(event.data.totals);
      phase = "done";
      renderStepper();
      document.getElementById("run-status").className = "run-status done";
      document.getElementById("run-status").textContent = "✅ 全部完成";
      showFinal(event.data.trip_log);
    } else if (event.type === "error") {
      showError(event.data.message);
    }
  };
  es.addEventListener("done", () => es.close());
}

function showFinal(tripLog) {
  document.getElementById("final-section").classList.remove("hidden");
  const review = tripLog.stages.review;
  const full = Math.round(review.overall_rating);
  document.getElementById("final-review-card").innerHTML = `
    <h2 style="font-size:1rem; margin-top:0;">⭐ 最終評價與分享</h2>
    <div class="stars">${"★".repeat(full)}${"☆".repeat(5 - full)} ${review.overall_rating}/5</div>
    <p>${esc(review.review_text)}</p>
    <div class="share-box">${esc(review.share_caption)}</div>
  `;
  document.getElementById("link-dashboard").href = `/api/chat/${runId}/dashboard`;
  document.getElementById("link-json").href = `/api/chat/${runId}/trip_log.json`;

  if (CONFIG.enable_calendar_sync) {
    document.getElementById("calendar-panel").classList.remove("hidden");
    const tomorrow = new Date(Date.now() + 86400000);
    document.getElementById("calendar-start-date").value = tomorrow.toISOString().slice(0, 10);
  }
}

document.getElementById("calendar-connect-btn").addEventListener("click", async () => {
  const startDate = document.getElementById("calendar-start-date").value;
  const resultEl = document.getElementById("calendar-result");
  try {
    const resp = await fetch(`/api/calendar/auth-url?run_id=${runId}&start_date=${startDate}`);
    const data = await resp.json();
    if (data.error) {
      resultEl.innerHTML = `<div style="font-size:.76rem; color:var(--text-muted);">⚠️ ${esc(data.error)}</div>`;
      return;
    }
    window.location.href = data.auth_url;
  } catch (e) {
    resultEl.innerHTML = `<div style="font-size:.76rem; color:var(--text-muted);">⚠️ 無法建立授權連結：${esc(e.message)}</div>`;
  }
});

// ---- load server config on page load: local inspiration-domain default + feature toggles ----
async function loadConfig() {
  try {
    const resp = await fetch("/api/config");
    CONFIG = await resp.json();
  } catch (e) {
    // keep the built-in CONFIG defaults (unrestricted search, both features on) if this fails
  }

  if (!CONFIG.enable_tail_pipeline) {
    PHASE_ORDER = PHASE_ORDER.filter(p => p !== "tail");
  }

  if (CONFIG.default_inspiration_domains && CONFIG.default_inspiration_domains.length) {
    const select = document.getElementById("site-mode-select");
    select.value = "allowlist";
    document.getElementById("site-mode-note").textContent =
      `已預設限定：${CONFIG.default_inspiration_domains.join("、")}（本機設定，未進版控）`;
  }

  if (!CONFIG.enable_tail_pipeline || !CONFIG.enable_calendar_sync) {
    document.getElementById("header-sub").textContent =
      "對話版 — 用一段話描述你的旅行，agent 生成一個真實方案，並導流到真實網站查看報價（本次示範範圍：行程規劃 → 導流）";
  }
}
loadConfig();

document.getElementById("send-btn").addEventListener("click", () => {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text) return;
  appendChatMessage("user", text);
  input.value = "";
  sendChatMessage(text);
});
document.getElementById("chat-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("send-btn").click();
});

document.getElementById("intake-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = document.getElementById("intake-input").value.trim();
  const payload = {
    site_mode: document.getElementById("site-mode-select").value,
    model: document.getElementById("model-select").value,
  };

  document.getElementById("start-btn").disabled = true;

  try {
    const startResp = await apiPost("/api/chat/start", payload);
    runId = startResp.run_id;

    document.getElementById("form-section").classList.add("hidden");
    document.getElementById("totals-bar").classList.remove("hidden");
    document.getElementById("run-status").classList.remove("hidden");
    document.getElementById("phase-stepper-section").classList.remove("hidden");
    document.getElementById("chat-section").classList.remove("hidden");
    phase = "itinerary";
    planReady = false;
    renderStepper();

    appendChatMessage("user", text || "（開始規劃）");
    const turnId = beginThinkingTurn();
    const data = await streamMessage(turnId, text);
    renderChatReply(turnId, data);
  } catch (e) {
    showError(e.message);
  } finally {
    document.getElementById("start-btn").disabled = false;
  }
});
</script>
